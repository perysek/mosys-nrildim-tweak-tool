<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{ title }}</h1>
            {% if descrizione %}
            <p class="graph-subtitle">Dimension: <strong>{{ descrizione }}</strong></p>
            {% endif %}
        </header>
        
        {% if error %}
        <div class="error-message">
            <p>{{ error }}</p>
            <button onclick="window.history.back()" class="btn-primary">Back to Table</button>
        </div>
        {% else %}
        <div class="graph-layout">
            <div class="graph-container">
                <canvas id="misChart"></canvas>
            </div>
            
            <div id="capabilityDisplay" class="capability-display"></div>
        </div>
        
        <div class="graph-actions">
            <button onclick="window.history.back()" class="btn-secondary">Back to Table</button>
        </div>
        {% endif %}
    </div>

    {% if not error %}
    <script>
        // Parse chart data from server
        var chartData = {{ chart_data|safe }};
        var numeroFiguraCount = {{ numero_figura_count }};
        var capabilityData = {{ capability_data|safe }};
        var valoreNominale = {{ valore_nominale if valore_nominale is not none else 'null' }};
        var usl = {{ usl if usl is not none else 'null' }};
        var lsl = {{ lsl if lsl is not none else 'null' }};
        var columnLabels = {{ column_labels|tojson|safe }};
        var cavityLabel = columnLabels['NUMERO_FIGURA'] || 'Cavity';
        
        // Display capability indices and tolerance limits if available
        if (Object.keys(capabilityData).length > 0 || (usl !== null && lsl !== null)) {
            var capabilityHtml = '<div class="capability-header">';
            if (valoreNominale !== null) {
                capabilityHtml += '<div class="nominal-value">Nominal Value: <strong>' + valoreNominale.toFixed(3) + '</strong></div>';
            }
            if (usl !== null && lsl !== null) {
                capabilityHtml += '<div class="tolerance-limits">';
                capabilityHtml += '<span class="limit-label">USL: <strong>' + usl.toFixed(3) + '</strong></span> | ';
                capabilityHtml += '<span class="limit-label">LSL: <strong>' + lsl.toFixed(3) + '</strong></span>';
                capabilityHtml += '</div>';
            }
            capabilityHtml += '</div><div class="capability-grid">';
            
            Object.keys(capabilityData).forEach(function(figura) {
                var data = capabilityData[figura];
                capabilityHtml += '<div class="capability-card">';
                capabilityHtml += '<div class="capability-card-title">' + cavityLabel + ': ' + figura + '</div>';
                capabilityHtml += '<div class="capability-stats">';
                capabilityHtml += '<div class="stat-item"><span class="stat-label">Cp:</span> <span class="stat-value">' + data.cp + '</span></div>';
                capabilityHtml += '<div class="stat-item"><span class="stat-label">Cpk:</span> <span class="stat-value">' + data.cpk + '</span></div>';
                capabilityHtml += '<div class="stat-item"><span class="stat-label">Mean:</span> <span class="stat-value">' + data.mean + '</span></div>';
                capabilityHtml += '<div class="stat-item"><span class="stat-label">Std:</span> <span class="stat-value">' + data.std + '</span></div>';
                capabilityHtml += '</div></div>';
            });
            
            capabilityHtml += '</div>';
            document.getElementById('capabilityDisplay').innerHTML = capabilityHtml;
        }
        
        // Define colors for different NUMERO_FIGURA
        var colors = [
            'rgb(54, 162, 235)',   // Blue
            'rgb(255, 99, 132)',   // Red
            'rgb(75, 192, 192)',   // Green
            'rgb(255, 159, 64)',   // Orange
            'rgb(153, 102, 255)',  // Purple
            'rgb(255, 205, 86)',   // Yellow
            'rgb(201, 203, 207)',  // Grey
            'rgb(255, 99, 255)',   // Pink
        ];
        
        // Prepare datasets for Chart.js
        var datasets = [];
        var figuraKeys = Object.keys(chartData);
        
        figuraKeys.forEach(function(figura, index) {
            var color = colors[index % colors.length];
            datasets.push({
                label: cavityLabel + ': ' + figura,
                data: chartData[figura].values,
                borderColor: color,
                backgroundColor: color.replace('rgb', 'rgba').replace(')', ', 0.1)'),
                borderWidth: 2,
                pointRadius: 4,
                pointHoverRadius: 6,
                tension: 0.1
            });
        });
        
        // Get all unique datetime labels
        var allLabels = [];
        figuraKeys.forEach(function(figura) {
            chartData[figura].labels.forEach(function(label) {
                if (!allLabels.includes(label)) {
                    allLabels.push(label);
                }
            });
        });
        allLabels.sort();
        
        // Align data to common labels
        datasets.forEach(function(dataset, idx) {
            var figura = figuraKeys[idx];
            var figuraLabels = chartData[figura].labels;
            var figuraValues = chartData[figura].values;
            
            var alignedData = allLabels.map(function(label) {
                var labelIndex = figuraLabels.indexOf(label);
                return labelIndex >= 0 ? figuraValues[labelIndex] : null;
            });
            
            dataset.data = alignedData;
        });
        
        // Add horizontal lines for USL and LSL if available
        if (usl !== null && lsl !== null) {
            // Add USL line dataset
            datasets.push({
                label: 'Upper Spec Limit (USL)',
                data: allLabels.map(() => usl),
                borderColor: 'rgb(220, 38, 38)',
                backgroundColor: 'rgba(220, 38, 38, 0.1)',
                borderWidth: 2,
                borderDash: [5, 5],
                pointRadius: 0,
                pointHoverRadius: 0,
                tension: 0
            });
            
            // Add LSL line dataset
            datasets.push({
                label: 'Lower Spec Limit (LSL)',
                data: allLabels.map(() => lsl),
                borderColor: 'rgb(220, 38, 38)',
                backgroundColor: 'rgba(220, 38, 38, 0.1)',
                borderWidth: 2,
                borderDash: [5, 5],
                pointRadius: 0,
                pointHoverRadius: 0,
                tension: 0
            });
        }
        
        // Add nominal value line if available
        if (valoreNominale !== null) {
            datasets.push({
                label: 'Nominal Value',
                data: allLabels.map(() => valoreNominale),
                borderColor: 'rgb(34, 197, 94)',
                backgroundColor: 'rgba(34, 197, 94, 0.1)',
                borderWidth: 2,
                borderDash: [10, 5],
                pointRadius: 0,
                pointHoverRadius: 0,
                tension: 0
            });
        }
        
        // Calculate y-axis min/max with 10% padding from tolerance limits
        var yAxisConfig = {
            display: true,
            title: {
                display: true,
                text: 'Average measurement result',
                font: {
                    size: 14,
                    weight: 'bold'
                }
            }
        };
        
        if (usl !== null && lsl !== null) {
            var range = usl - lsl;
            var padding = range * 0.1;
            yAxisConfig.min = lsl - padding;
            yAxisConfig.max = usl + padding;
        }
        
        // Create chart
        var ctx = document.getElementById('misChart').getContext('2d');
        var chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: allLabels,
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        font: {
                            size: 18,
                            weight: 'bold'
                        }
                    },
                    legend: {
                        display: true,
                        position: 'top',
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                    }
                },
                scales: {
                    x: {
                        display: true,
                        title: {
                            display: true,
                            text: 'Date & Time',
                            font: {
                                size: 14,
                                weight: 'bold'
                            }
                        },
                        ticks: {
                            maxRotation: 45,
                            minRotation: 45
                        }
                    },
                    y: yAxisConfig
                },
                interaction: {
                    mode: 'nearest',
                    axis: 'x',
                    intersect: false
                }
            }
        });
    </script>
    {% endif %}
</body>
</html>
