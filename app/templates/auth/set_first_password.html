<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set password — MOSYS Dimensional Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='tokens.css') }}">
    {% include 'auth/_auth_style.html' %}
</head>
<body>
<div class="auth-card">
    <div class="auth-brand">
        <p class="brand-title">MOSYS</p>
        <p class="brand-sub">Dimensional Results</p>
    </div>

    {% for category, message in get_flashed_messages(with_categories=true) %}
    <div class="auth-flash auth-flash--{{ category }}">{{ message }}</div>
    {% endfor %}

    <form method="POST">
        <h1 class="auth-title">Set your password</h1>
        <p style="text-align:center;font-size:0.8125rem;color:var(--color-ink-muted);margin:-0.5rem 0 1rem;">
            You must set a password before continuing.
        </p>
        <div class="auth-field">
            <label class="field-label" for="new_password">New password</label>
            <input type="password" id="new_password" name="new_password" class="refined-input"
                   minlength="8" required autofocus>
        </div>
        <div class="auth-field">
            <label class="field-label" for="confirm_password">Confirm password</label>
            <input type="password" id="confirm_password" name="confirm_password" class="refined-input"
                   minlength="8" required>
        </div>
        <div class="auth-actions">
            <button type="submit" class="btn-refined btn-refined-primary btn-press"
                    style="width:100%;justify-content:center;">Set password</button>
        </div>
    </form>
</div>
</body>
</html>
