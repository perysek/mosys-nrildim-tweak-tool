<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in — MOSYS Dimensional Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='tokens.css') }}">
    {% include 'auth/_auth_style.html' %}
</head>
<body>
<div class="auth-card">
    <div class="auth-brand">
        <p class="brand-title">MOSYS</p>
        <p class="brand-sub">Dimensional Results</p>
    </div>

    {% for category, message in get_flashed_messages(with_categories=true) %}
    <div class="auth-flash auth-flash--{{ category }}">{{ message }}</div>
    {% endfor %}

    <form id="login-form" method="POST" action="{{ url_for('login') }}">
        <h1 class="auth-title">Log in</h1>
        <div class="auth-field">
            <label class="field-label" for="employee_id">Employee ID</label>
            <input type="text" id="employee_id" name="employee_id" class="refined-input"
                   inputmode="numeric" maxlength="4" placeholder="0000" autocomplete="off"
                   value="{{ employee_id }}" required autofocus>
        </div>
        <div class="auth-field">
            <label class="field-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="refined-input" required>
        </div>
        <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.78rem;color:var(--color-ink-muted);">
            <input type="checkbox" name="remember"> Remember me
        </label>
        <div class="auth-actions">
            <button type="submit" class="btn-refined btn-refined-primary btn-press"
                    style="width:100%;justify-content:center;">Log in</button>
        </div>
        <div class="auth-links">
            <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
        </div>
    </form>

    <form id="first-login-form" method="POST" action="{{ url_for('first_login') }}" style="display:none;">
        <h1 class="auth-title">Set your password</h1>
        <input type="hidden" name="mosys_id" id="fl-mosys-id">
        <p id="fl-name" style="text-align:center;font-size:0.85rem;color:var(--color-ink-muted);margin:-0.5rem 0 1rem;"></p>
        <div class="auth-field">
            <label class="field-label" for="fl-new-password">New password</label>
            <input type="password" id="fl-new-password" name="new_password" class="refined-input" minlength="8" required>
        </div>
        <div class="auth-field">
            <label class="field-label" for="fl-confirm-password">Confirm password</label>
            <input type="password" id="fl-confirm-password" name="confirm_password" class="refined-input" minlength="8" required>
        </div>
        <div class="auth-actions">
            <button type="submit" class="btn-refined btn-refined-primary btn-press"
                    style="width:100%;justify-content:center;">Set password &amp; log in</button>
        </div>
        <div class="auth-links">
            <a href="#" id="fl-back-btn">&larr; Back</a>
        </div>
    </form>
</div>

<script>
    (function () {
        var empInput = document.getElementById('employee_id');
        var pwInput = document.getElementById('password');
        var loginForm = document.getElementById('login-form');
        var flForm = document.getElementById('first-login-form');
        var flMosysId = document.getElementById('fl-mosys-id');
        var flName = document.getElementById('fl-name');
        var flNewPw = document.getElementById('fl-new-password');
        var flBack = document.getElementById('fl-back-btn');

        empInput.addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 4);
            if (this.value.length === 4) {
                fetch('{{ url_for("auth_needs_setup") }}?mosys_id=' + encodeURIComponent(this.value))
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        if (data.needs_setup) {
                            flMosysId.value = empInput.value;
                            flName.textContent = data.full_name || ('Employee ' + empInput.value);
                            loginForm.style.display = 'none';
                            flForm.style.display = 'block';
                            flNewPw.focus();
                        } else {
                            loginForm.style.display = 'block';
                            flForm.style.display = 'none';
                            pwInput.focus();
                        }
                    })
                    .catch(function () { /* connection hiccup — stay on regular login */ });
            }
        });

        flBack.addEventListener('click', function (e) {
            e.preventDefault();
            flForm.style.display = 'none';
            loginForm.style.display = 'block';
            empInput.value = '';
            empInput.focus();
        });
    })();
</script>
</body>
</html>
