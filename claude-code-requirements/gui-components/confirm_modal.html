<!-- Confirmation Modal Component -->
<!-- Modal look + motion driven by id-scoped CSS (not arbitrary Tailwind classes) so it works
     against the pre-built output.css without a rebuild — matches golden master appointments/list.html -->
<style>
    #confirm-modal-backdrop {
        background: rgba(0,0,0,0.35);
        backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        opacity: 0; transition: opacity 0.25s var(--ease-out-expo);
    }
    #confirm-modal-backdrop.is-open { opacity: 1; }
    #confirm-modal-panel {
        background: #fff;
        border: 1px solid var(--color-border);
        border-radius: 3px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        opacity: 0; transform: translateY(8px) scale(0.98);
        transition: opacity 0.25s var(--ease-out-expo), transform 0.25s var(--ease-out-expo);
    }
    #confirm-modal-panel.is-open { opacity: 1; transform: none; }

    /* Flat token buttons (P07: canonical language, flat fills + small radii).
       Id-scoped so no Tailwind rebuild is needed. */
    #confirm-modal-icon { border-radius: 3px; }
    #confirm-modal .cm-btn {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 0.625rem 1.25rem; font-size: 0.875rem; font-weight: 500;
        border-radius: 2px; cursor: pointer; border: none;
        transition: all 0.2s ease;
    }
    #confirm-modal .cm-btn:focus-visible { outline: 2px solid var(--color-focus-ring); outline-offset: 2px; }
    #confirm-modal .cm-btn-cancel {
        background: white; color: var(--color-ink-muted);
        border: 1px solid var(--color-border);
    }
    #confirm-modal .cm-btn-cancel:hover { border-color: var(--color-ink-muted); background: var(--color-surface); color: var(--color-ink); }
    #confirm-modal .cm-btn-confirm { color: white; }
    #confirm-modal .cm-btn-confirm:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    #confirm-modal .cm-btn-confirm.cm-danger { background: var(--color-status-cancelled); }
    #confirm-modal .cm-btn-confirm.cm-danger:hover { background: var(--color-status-cancelled-dark); }
    #confirm-modal .cm-btn-confirm.cm-warning { background: var(--color-status-in-progress); }
    #confirm-modal .cm-btn-confirm.cm-warning:hover { background: #b45309; }
    #confirm-modal .cm-btn-confirm.cm-info { background: var(--color-focus-ring); }
    #confirm-modal .cm-btn-confirm.cm-info:hover { background: var(--color-chart-blue-dark); }
</style>
<div id="confirm-modal" class="fixed inset-0 z-[9999] hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <!-- Backdrop with blur — matches golden master (templates/appointments/list.html) -->
    <div class="absolute inset-0" id="confirm-modal-backdrop" onclick="closeConfirmModal()"></div>

    <!-- Modal Panel Container -->
    <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
        <div class="relative max-w-md w-full pointer-events-auto"
             id="confirm-modal-panel">

            <!-- Header with Icon -->
            <div class="px-6 pt-6 pb-4">
                <div class="flex items-start gap-4">
                    <!-- Dynamic Icon Container -->
                    <div id="confirm-modal-icon" class="w-12 h-12 flex items-center justify-center flex-shrink-0 bg-red-100">
                        <svg class="w-6 h-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="text-lg font-semibold text-slate-800 leading-tight" id="confirm-modal-title">{{ msg('modal.confirm.title') }}</h3>
                        <p class="text-sm text-slate-500 mt-2 leading-relaxed" id="confirm-modal-message">{{ msg('modal.confirm.message') }}</p>
                    </div>
                    <!-- Close X Button -->
                    <button type="button" onclick="closeConfirmModal()"
                            class="text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg p-1 transition-colors -mt-1 -mr-1"
                            aria-label="Zamknij okno dialogowe">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Actions Footer -->
            <div class="px-6 pb-6 pt-2 flex items-center justify-end gap-3 bg-slate-50/80 rounded-b-[3px] border-t border-slate-100">
                <button type="button" onclick="closeConfirmModal()"
                        class="cm-btn cm-btn-cancel active:scale-[0.98]">
                    {{ msg('modal.confirm.cancel_btn') }}
                </button>
                <button type="button" id="confirm-modal-submit-btn"
                        class="cm-btn cm-btn-confirm cm-danger active:scale-[0.98]">
                    {{ msg('modal.confirm.confirm_btn') }}
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let confirmModalTargetForm = null;
    let confirmModalCallback = null;

    /**
     * Show confirmation modal
     * @param {HTMLFormElement|null} form - Form to submit on confirm (optional)
     * @param {string} title - Modal title
     * @param {string} message - Modal message
     * @param {string} confirmBtnText - Confirm button text
     * @param {string} type - Modal type: 'danger', 'warning', 'info' (affects icon/button color)
     * @param {Function} callback - Optional callback function instead of form submit
     */
    function showConfirmModal(form, title, message, confirmBtnText = MSG('modal.confirm.confirm_btn'), type = 'danger', callback = null) {
        confirmModalTargetForm = form;
        confirmModalCallback = callback;

        const modal = document.getElementById('confirm-modal');
        const backdrop = document.getElementById('confirm-modal-backdrop');
        const panel = document.getElementById('confirm-modal-panel');
        const titleEl = document.getElementById('confirm-modal-title');
        const messageEl = document.getElementById('confirm-modal-message');
        const submitBtn = document.getElementById('confirm-modal-submit-btn');
        const iconContainer = document.getElementById('confirm-modal-icon');

        // Set content
        if (title) titleEl.textContent = title;
        if (message) messageEl.textContent = message;
        if (confirmBtnText) submitBtn.textContent = confirmBtnText;

        // Update styling based on type — flat token classes from the id-scoped
        // <style> block above (cm-danger / cm-warning / cm-info)
        const typeStyles = {
            danger: {
                iconBg: 'bg-red-100',
                iconColor: 'text-red-600',
                btnClass: 'cm-danger',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />'
            },
            warning: {
                iconBg: 'bg-amber-100',
                iconColor: 'text-amber-600',
                btnClass: 'cm-warning',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />'
            },
            info: {
                iconBg: 'bg-blue-100',
                iconColor: 'text-blue-600',
                btnClass: 'cm-info',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />'
            }
        };

        const style = typeStyles[type] || typeStyles.danger;

        // Update icon container
        iconContainer.className = `w-12 h-12 flex items-center justify-center flex-shrink-0 ${style.iconBg}`;
        iconContainer.innerHTML = `<svg class="w-6 h-6 ${style.iconColor}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">${style.icon}</svg>`;

        // Update button styling
        submitBtn.className = `cm-btn cm-btn-confirm ${style.btnClass} active:scale-[0.98]`;

        // Prevent body scroll
        document.body.style.overflow = 'hidden';

        // Show modal
        modal.classList.remove('hidden');

        // Trigger animations after display change
        requestAnimationFrame(() => {
            backdrop.classList.add('is-open');
            panel.classList.add('is-open');
        });

        // Focus the cancel button for accessibility
        setTimeout(() => {
            const cancelBtn = panel.querySelector('button[onclick="closeConfirmModal()"]');
            if (cancelBtn) cancelBtn.focus();
        }, 100);

        // Bind submit handler
        submitBtn.onclick = function() {
            if (confirmModalCallback) {
                confirmModalCallback();
            } else if (confirmModalTargetForm) {
                confirmModalTargetForm.submit();
            }
            closeConfirmModal();
        };
    }

    function closeConfirmModal() {
        const modal = document.getElementById('confirm-modal');
        const backdrop = document.getElementById('confirm-modal-backdrop');
        const panel = document.getElementById('confirm-modal-panel');

        // Animate out
        backdrop.classList.remove('is-open');
        panel.classList.remove('is-open');

        // Hide after animation and restore body scroll
        setTimeout(() => {
            modal.classList.add('hidden');
            document.body.style.overflow = '';
            confirmModalTargetForm = null;
            confirmModalCallback = null;
        }, 250);
    }

    // Global helper for delete forms
    function confirmDelete(form, itemName) {
        showConfirmModal(
            form,
            MSG('modal.delete.title'),
            MSG('modal.delete.message', { item: itemName }),
            MSG('modal.delete.confirm_btn'),
            'danger'
        );
        return false;
    }

    // Close on Escape key + tab trap inside modal
    document.addEventListener('keydown', function(e) {
        const modal = document.getElementById('confirm-modal');
        if (!modal || modal.classList.contains('hidden')) return;

        if (e.key === 'Escape') {
            closeConfirmModal();
            return;
        }

        if (e.key === 'Tab') {
            const panel = document.getElementById('confirm-modal-panel');
            const focusable = Array.from(
                panel.querySelectorAll('button:not([disabled])')
            ).filter(el => el.offsetParent !== null);
            if (focusable.length < 2) return;

            const first = focusable[0];
            const last  = focusable[focusable.length - 1];

            if (e.shiftKey) {
                if (document.activeElement === first) {
                    e.preventDefault();
                    last.focus();
                }
            } else {
                if (document.activeElement === last) {
                    e.preventDefault();
                    first.focus();
                }
            }
        }
    });
</script>
