<!-- Undo Toast Component — include once in base.html or pages that need undo -->
<script>
/**
 * Show a toast with an "Cofnij" (Undo) link that calls a restore endpoint.
 * @param {string} message - The deletion confirmation message
 * @param {string} restoreUrl - The POST URL to restore the deleted record
 * @param {number} duration - How long the toast stays visible (ms), default 8000
 */
function showUndoToast(message, restoreUrl, duration = 8000) {
    const old = document.getElementById('undo-toast');
    if (old) old.remove();

    const toast = document.createElement('div');
    toast.id = 'undo-toast';
    toast.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;' +
        'background:white;border:1px solid var(--pp-success, #10b981);border-left:4px solid var(--pp-success, #10b981);' +
        'border-radius:0.75rem;padding:0.75rem 1rem;font-size:0.875rem;color:#1e293b;' +
        'box-shadow:0 4px 20px rgba(0,0,0,0.15);opacity:0;transition:opacity 0.2s;' +
        'max-width:400px;display:flex;align-items:center;gap:0.75rem;';

    const msgSpan = document.createElement('span');
    msgSpan.textContent = message;
    msgSpan.style.flex = '1';

    const undoBtn = document.createElement('button');
    undoBtn.textContent = 'Cofnij';
    undoBtn.style.cssText = 'background:none;border:none;color:var(--pp-blue, #3b82f6);' +
        'font-weight:600;cursor:pointer;padding:0.25rem 0.5rem;border-radius:0.375rem;' +
        'font-size:0.875rem;white-space:nowrap;transition:background 0.15s;';
    undoBtn.onmouseenter = () => undoBtn.style.background = 'rgba(59,130,246,0.1)';
    undoBtn.onmouseleave = () => undoBtn.style.background = 'none';
    undoBtn.onclick = async () => {
        undoBtn.textContent = '...';
        undoBtn.disabled = true;
        try {
            const resp = await fetch(restoreUrl, { method: 'POST' });
            const data = await resp.json();
            if (data.success) {
                toast.style.borderColor = 'var(--pp-success, #10b981)';
                msgSpan.textContent = data.message || 'Przywrócono';
                undoBtn.remove();
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 200); }, 2000);
                // Reload page to show restored record
                setTimeout(() => location.reload(), 2200);
            } else {
                msgSpan.textContent = data.error || 'Błąd przywracania';
                undoBtn.textContent = 'Cofnij';
                undoBtn.disabled = false;
            }
        } catch (e) {
            msgSpan.textContent = 'Błąd połączenia';
            undoBtn.textContent = 'Cofnij';
            undoBtn.disabled = false;
        }
    };

    const closeBtn = document.createElement('button');
    closeBtn.innerHTML = '&times;';
    closeBtn.style.cssText = 'background:none;border:none;color:#94a3b8;font-size:1.25rem;' +
        'cursor:pointer;padding:0 0.25rem;line-height:1;';
    closeBtn.onclick = () => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 200); };

    toast.appendChild(msgSpan);
    toast.appendChild(undoBtn);
    toast.appendChild(closeBtn);
    document.body.appendChild(toast);
    requestAnimationFrame(() => toast.style.opacity = '1');

    // Auto-hide after duration
    const timer = setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 200);
    }, duration);

    // Cancel auto-hide if user interacts
    toast.onmouseenter = () => clearTimeout(timer);
}
</script>
